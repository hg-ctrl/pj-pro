<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="PJ Pro"/>
<title>PJ Pro — Pièces Justificatives</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --green:#3B6D11;--green-light:#EAF3DE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --bg:#f5f5f7;--card:#fff;--border:#e0e0e0;--border2:#d0d0d0;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{--text:#f0f0f0;--text2:#aaa;--text3:#666;--bg:#1c1c1e;--card:#2c2c2e;--border:#3a3a3c;--border2:#48484a;}
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);font-size:16px;}

#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);padding:env(safe-area-inset-top,14px) 16px 10px;padding-top:max(env(safe-area-inset-top),14px);}
.topbar-title{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* YEAR TABS */
.year-tabs{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 0;background:var(--card);border-bottom:0.5px solid var(--border);scrollbar-width:none;}
.year-tabs::-webkit-scrollbar{display:none;}
.year-tab{flex-shrink:0;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s;}
.year-tab.active{background:var(--blue-light);color:var(--blue-dark);border-color:#B5D4F4;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px 16px 110px;-webkit-overflow-scrolling:touch;}

.month-section{margin-bottom:18px;}
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.month-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.month-total-lbl{font-size:12px;color:var(--text2);}

.month-folder-btn{display:flex;align-items:center;gap:12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;width:100%;margin-bottom:5px;transition:all .15s;-webkit-appearance:none;}
.month-folder-icon{width:44px;height:44px;border-radius:10px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.month-folder-info{flex:1;text-align:left;}
.month-folder-name{font-size:15px;font-weight:600;color:var(--text);}
.month-folder-count{font-size:12px;color:var(--text2);margin-top:2px;}
.pdf-mini-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;background:transparent;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s;}

.receipt-list{padding-left:56px;}
.receipt-item{display:flex;align-items:center;gap:10px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:4px;cursor:pointer;transition:background .15s;}
.receipt-thumb{width:38px;height:38px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.receipt-thumb img{width:38px;height:38px;object-fit:cover;}
.receipt-info{flex:1;min-width:0;}
.receipt-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.receipt-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.receipt-amount{font-size:13px;font-weight:600;color:var(--blue-dark);flex-shrink:0;}

/* FAB */
.fab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;gap:10px;padding:12px 16px;padding-bottom:max(env(safe-area-inset-bottom),12px);background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:0.5px solid var(--border);z-index:100;}
@media(prefers-color-scheme:dark){.fab{background:rgba(28,28,30,0.9);}}
.btn-scan{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--blue);color:#fff;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:-0.2px;}
.btn-export{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--card);border:0.5px solid var(--border2);border-radius:14px;padding:14px 18px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text);white-space:nowrap;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:10px 20px;padding-bottom:max(env(safe-area-inset-bottom),24px);width:100%;max-width:430px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:4px auto 16px;}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-0.2px;}

/* SCAN */
.scan-area{background:var(--bg);border:1.5px dashed var(--border2);border-radius:var(--radius);padding:30px 20px;text-align:center;cursor:pointer;margin-bottom:14px;}
.scan-area:active{background:var(--blue-light);border-color:var(--blue);}
.scan-area svg{margin-bottom:10px;}
.scan-area-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.scan-area-sub{font-size:13px;color:var(--text2);}
.preview-img{width:100%;border-radius:var(--radius);max-height:220px;object-fit:cover;margin-bottom:14px;display:none;}

.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em;}
.form-input{width:100%;padding:11px 13px;font-size:15px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);-webkit-appearance:none;appearance:none;}
.form-input:focus{outline:none;border-color:var(--blue);}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

.btn-primary{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;}
.btn-primary:active{opacity:.85;}
.btn-cancel{width:100%;padding:13px;background:transparent;color:var(--text2);border:0.5px solid var(--border);border-radius:var(--radius);font-size:15px;cursor:pointer;margin-top:8px;}

/* EXPORT OPTIONS */
.export-opt{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--radius);border:0.5px solid var(--border);cursor:pointer;margin-bottom:10px;background:var(--card);transition:background .15s;}
.export-opt:active{background:var(--bg);}
.export-opt-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.export-opt-title{font-size:16px;font-weight:600;}
.export-opt-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* DETAIL */
.detail-img{width:100%;border-radius:var(--radius);max-height:240px;object-fit:cover;margin-bottom:14px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border);}
.detail-row:last-of-type{border-bottom:none;}
.detail-key{font-size:14px;color:var(--text2);}
.detail-val{font-size:15px;font-weight:600;}
.btn-delete{width:100%;padding:13px;background:var(--red-light);color:var(--red);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
.empty svg{margin-bottom:14px;opacity:.4;}
.empty-title{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--text);}
.empty-sub{font-size:14px;}

/* TOAST */
.toast{position:fixed;top:max(env(safe-area-inset-top),20px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px);}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="topbar-title">PJ Professionnelles</div>
    <div class="topbar-sub" id="topbarSub">Chargement…</div>
  </div>
  <div class="year-tabs" id="yearTabs"></div>
  <div class="content" id="content"></div>
  <div class="fab">
    <button class="btn-export" onclick="openExport()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PDF
    </button>
    <button class="btn-scan" onclick="openScan()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Scanner
    </button>
  </div>
</div>

<!-- SCAN MODAL -->
<div class="overlay" id="scanOverlay" onclick="closeIfBg(event,'scanOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Ajouter un justificatif</div>
    <div class="scan-area" id="scanArea" onclick="document.getElementById('camInput').click()">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="1.8">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <div class="scan-area-title">Photographier le justificatif</div>
      <div class="scan-area-sub">Appuyez pour ouvrir l'appareil photo</div>
    </div>
    <input type="file" id="camInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>
    <img id="previewImg" class="preview-img" alt="aperçu"/>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" id="fDate" class="form-input"/>
      </div>
      <div class="form-group">
        <label class="form-label">Montant (€)</label>
        <input type="number" id="fAmount" step="0.01" placeholder="0,00" class="form-input"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Libellé</label>
      <input type="text" id="fLabel" placeholder="Taxi, repas, hôtel…" class="form-input"/>
    </div>
    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select id="fCat" class="form-input">
        <option>Transport</option>
        <option>Repas</option>
        <option>Hébergement</option>
        <option>Fournitures</option>
        <option>Télécommunication</option>
        <option>Formation</option>
        <option>Autre</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveReceipt()">Enregistrer</button>
    <button class="btn-cancel" onclick="closeOverlay('scanOverlay')">Annuler</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="exportOverlay" onclick="closeIfBg(event,'exportOverlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Exporter en PDF</div>
    <div class="export-opt" onclick="doExportMonth()">
      <div class="export-opt-icon" style="background:#E6F1FB;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div>
        <div class="export-opt-title">Synthèse mensuelle</div>
        <div class="export-opt-sub" id="lblMonth">Mois en cours</div>
      </div>
    </div>
    <div class="export-opt" onclick="doExportYear()">
      <div class="export-opt-icon" style="background:#EAF3DE;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div>
        <div class="export-opt-title">Synthèse annuelle</div>
        <div class="export-opt-sub" id="lblYear">Année complète</div>
      </div>
    </div>
    <button class="btn-cancel" onclick="closeOverlay('exportOverlay')">Annuler</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeIfBg(event,'detailOverlay')">
  <div class="sheet" id="detailSheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
let receipts=[];
let currentYear=new Date().getFullYear();
let capturedImg=null;

function load(){
  try{const d=localStorage.getItem('pjpro');if(d)receipts=JSON.parse(d);}catch(e){}
  if(!receipts.length)demo();
}
function save(){try{localStorage.setItem('pjpro',JSON.stringify(receipts));}catch(e){}}

function demo(){
  receipts=[
    {id:1,date:'2025-01-08',label:'Taxi CDG',amount:42.50,category:'Transport',image:null},
    {id:2,date:'2025-01-15',label:'Repas client Paris',amount:87.20,category:'Repas',image:null},
    {id:3,date:'2025-02-03',label:'Hôtel Marriott Lyon',amount:124.00,category:'Hébergement',image:null},
    {id:4,date:'2025-02-18',label:'TGV Paris-Lyon',amount:68.00,category:'Transport',image:null},
    {id:5,date:'2025-03-05',label:'Fournitures bureau',amount:31.60,category:'Fournitures',image:null},
    {id:6,date:'2025-04-11',label:'Repas équipe projet',amount:156.00,category:'Repas',image:null},
    {id:7,date:'2025-04-22',label:'Train retour Lyon',amount:72.00,category:'Transport',image:null},
  ];
  save();
}

function years(){
  const ys=[...new Set(receipts.map(r=>new Date(r.date).getFullYear()))];
  if(!ys.includes(currentYear))ys.push(currentYear);
  return ys.sort((a,b)=>b-a);
}

function monthsFor(y){
  const m={};
  receipts.filter(r=>new Date(r.date).getFullYear()===y)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .forEach(r=>{const mo=new Date(r.date).getMonth();if(!m[mo])m[mo]=[];m[mo].push(r);});
  return m;
}

function renderTabs(){
  const ys=years();
  document.getElementById('yearTabs').innerHTML=ys.map(y=>`<button class="year-tab${y===currentYear?' active':''}" onclick="selectYear(${y})">${y}</button>`).join('');
}

function selectYear(y){currentYear=y;renderTabs();renderContent();}

function fmt(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}

function renderContent(){
  const months=monthsFor(currentYear);
  const all=receipts.filter(r=>new Date(r.date).getFullYear()===currentYear);
  const total=all.reduce((s,r)=>s+r.amount,0);
  document.getElementById('topbarSub').textContent=`${all.length} justificatif${all.length!==1?'s':''} · ${total.toFixed(2)} € en ${currentYear}`;
  const c=document.getElementById('content');
  if(!Object.keys(months).length){
    c.innerHTML=`<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><div class="empty-title">Aucune pièce jointe</div><div class="empty-sub">Appuyez sur Scanner pour commencer</div></div>`;
    return;
  }
  c.innerHTML=Object.keys(months).sort((a,b)=>+a-+b).map(m=>{
    const rs=months[m];
    const mt=rs.reduce((s,r)=>s+r.amount,0);
    return`<div class="month-section">
      <div class="month-header">
        <span class="month-label">${MONTHS[m]} ${currentYear}</span>
        <span class="month-total-lbl">${mt.toFixed(2)} €</span>
      </div>
      <button class="month-folder-btn" onclick="toggleList('list${m}')">
        <div class="month-folder-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="month-folder-info">
          <div class="month-folder-name">${MONTHS[m]}</div>
          <div class="month-folder-count">${rs.length} pièce${rs.length>1?'s':''} · ${mt.toFixed(2)} €</div>
        </div>
        <button class="pdf-mini-btn" onclick="event.stopPropagation();exportMonthDirect(${+m},${currentYear})">PDF</button>
      </button>
      <div class="receipt-list" id="list${m}" style="display:none">${rs.map(r=>`
        <div class="receipt-item" onclick="showDetail(${r.id})">
          <div class="receipt-thumb">${r.image?`<img src="${r.image}" alt=""/>`:
            `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`}
          </div>
          <div class="receipt-info">
            <div class="receipt-name">${r.label}</div>
            <div class="receipt-meta">${fmt(r.date)} · ${r.category}</div>
          </div>
          <div class="receipt-amount">${r.amount.toFixed(2)} €</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleList(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

function openScan(){
  capturedImg=null;
  document.getElementById('scanArea').style.display='';
  const pi=document.getElementById('previewImg');pi.style.display='none';pi.src='';
  document.getElementById('camInput').value='';
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('fAmount').value='';
  document.getElementById('fLabel').value='';
  document.getElementById('fCat').value='Transport';
  document.getElementById('scanOverlay').classList.add('open');
}

function openExport(){
  const now=new Date();
  document.getElementById('lblMonth').textContent=`${MONTHS[now.getMonth()]} ${currentYear}`;
  document.getElementById('lblYear').textContent=`Tous les mois de ${currentYear}`;
  document.getElementById('exportOverlay').classList.add('open');
}

function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function closeIfBg(e,id){if(e.target===document.getElementById(id))closeOverlay(id);}

function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    capturedImg=ev.target.result;
    const pi=document.getElementById('previewImg');
    pi.src=capturedImg;pi.style.display='block';
    document.getElementById('scanArea').style.display='none';
  };
  r.readAsDataURL(f);
}

function saveReceipt(){
  const date=document.getElementById('fDate').value;
  const amount=parseFloat(document.getElementById('fAmount').value);
  const label=document.getElementById('fLabel').value.trim();
  if(!date||isNaN(amount)||!label){toast('Veuillez remplir tous les champs');return;}
  receipts.push({id:Date.now(),date,label,amount,category:document.getElementById('fCat').value,image:capturedImg});
  receipts.sort((a,b)=>new Date(a.date)-new Date(b.date));
  save();
  closeOverlay('scanOverlay');
  currentYear=new Date(date).getFullYear();
  renderTabs();renderContent();
  toast('Justificatif enregistré ✓');
}

function showDetail(id){
  const r=receipts.find(x=>x.id===id);if(!r)return;
  document.getElementById('detailSheet').innerHTML=`
    <div class="handle"></div>
    ${r.image?`<img src="${r.image}" class="detail-img" alt="justificatif"/>`:''}
    <div class="sheet-title">${r.label}</div>
    <div class="detail-row"><span class="detail-key">Date</span><span class="detail-val">${fmt(r.date)}</span></div>
    <div class="detail-row"><span class="detail-key">Montant</span><span class="detail-val" style="color:#185FA5">${r.amount.toFixed(2)} €</span></div>
    <div class="detail-row"><span class="detail-key">Catégorie</span><span class="detail-val">${r.category}</span></div>
    <button class="btn-delete" onclick="deleteReceipt(${id})">Supprimer ce justificatif</button>
    <button class="btn-cancel" onclick="closeOverlay('detailOverlay')">Fermer</button>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function deleteReceipt(id){
  receipts=receipts.filter(r=>r.id!==id);save();
  closeOverlay('detailOverlay');renderTabs();renderContent();
  toast('Justificatif supprimé');
}

function buildPDF(titre,rows,totalLbl){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=20;let y=20;
  doc.setFillColor(24,95,165);doc.rect(0,0,W,42,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);doc.setFont(undefined,'bold');
  doc.text('Synthèse des dépenses professionnelles',W/2,17,{align:'center'});
  doc.setFontSize(12);doc.setFont(undefined,'normal');
  doc.text(titre,W/2,27,{align:'center'});
  doc.setFontSize(9);doc.text(`Édité le ${new Date().toLocaleDateString('fr-FR')}`,W/2,35,{align:'center'});
  y=54;
  doc.setFillColor(232,240,248);doc.rect(M,y-5,W-2*M,9,'F');
  doc.setTextColor(24,95,165);doc.setFontSize(9);doc.setFont(undefined,'bold');
  doc.text('Date',M+2,y);doc.text('Libellé',M+28,y);doc.text('Catégorie',M+96,y);doc.text('Montant',W-M-2,y,{align:'right'});
  y+=7;
  let total=0;
  doc.setFont(undefined,'normal');
  rows.forEach((r,i)=>{
    if(y>272){doc.addPage();y=20;}
    if(i%2===0){doc.setFillColor(248,250,253);doc.rect(M,y-4,W-2*M,7,'F');}
    doc.setTextColor(30,30,30);doc.setFontSize(9);
    doc.text(fmt(r.date),M+2,y);
    doc.text((r.label.length>40?r.label.slice(0,39)+'…':r.label),M+28,y);
    doc.text(r.category,M+96,y);
    doc.setTextColor(24,95,165);
    doc.text(r.amount.toFixed(2)+' €',W-M-2,y,{align:'right'});
    doc.setTextColor(30,30,30);
    total+=r.amount;y+=7;
  });
  y+=5;
  doc.setFillColor(24,95,165);doc.rect(M,y-4,W-2*M,10,'F');
  doc.setTextColor(255,255,255);doc.setFont(undefined,'bold');doc.setFontSize(10);
  doc.text(totalLbl,M+2,y+2);doc.text(total.toFixed(2)+' €',W-M-2,y+2,{align:'right'});
  doc.save(titre.replace(/\s+/g,'_').toLowerCase()+'.pdf');
  toast('PDF exporté ✓');
}

function doExportMonth(){
  const now=new Date(),m=now.getMonth();
  const rows=receipts.filter(r=>{const d=new Date(r.date);return d.getFullYear()===currentYear&&d.getMonth()===m;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  closeOverlay('exportOverlay');
  if(!rows.length){toast('Aucune pièce ce mois-ci');return;}
  buildPDF(`${MONTHS[m]} ${currentYear}`,rows,`Total ${MONTHS[m]} ${currentYear}`);
}

function doExportYear(){
  const rows=receipts.filter(r=>new Date(r.date).getFullYear()===currentYear).sort((a,b)=>new Date(a.date)-new Date(b.date));
  closeOverlay('exportOverlay');
  if(!rows.length){toast('Aucune pièce cette année');return;}
  buildPDF(`Année ${currentYear}`,rows,`Total ${currentYear}`);
}

function exportMonthDirect(m,y){
  const rows=receipts.filter(r=>{const d=new Date(r.date);return d.getFullYear()===y&&d.getMonth()===m;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!rows.length){toast('Aucune pièce ce mois-ci');return;}
  buildPDF(`${MONTHS[m]} ${y}`,rows,`Total ${MONTHS[m]} ${y}`);
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

load();renderTabs();renderContent();
</script>
